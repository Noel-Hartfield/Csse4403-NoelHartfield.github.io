<html>
<body>

<h1>Book Search Results</h1>

<div id="output"></div>

<script>

// Example JSON containing multiple books
const bookData = {
    "docs": [
        {
            "title": "The Modern Web",
            "author_name": ["Peter Gasston"],
            "first_publish_year": 2013,
            "isbn": ["1593274874"]
        },
        {
            "title": "Modern Technologies in Web Services Research",
            "author_name": ["Liang-Jie Zhang"],
            "first_publish_year": 2007,
            "isbn": ["1599042800"]
        }
    ]
};

const container = document.getElementById("output");

// LOOP STRUCTURE (Required)
bookData.docs.forEach(function(book) {

    const title = book.title || "No Title";
    const author = book.author_name ? book.author_name.join(", ") : "Unknown Author";
    const year = book.first_publish_year || "Unknown Year";
    const isbn = book.isbn ? book.isbn[0] : "N/A";

    container.innerHTML += `
        <div class="book">
            <h2>${title}</h2>
            <p><strong>Author:</strong> ${author}</p>
            <p><strong>First Published:</strong> ${year}</p>
            <p><strong>ISBN:</strong> ${isbn}</p>
        </div>
    `;
});
</script>
</body>
</html>
